{{/* Display the navigational breadcrumbs for the given page,
     linking each level
*/}}
<nav class="breadcrumbs">
    {{ range $i, $p := .Ancestors.Reverse }}
        {{ if gt $i 0 }}
            {{ if ne $i 1 }} / {{ end }}
            <a href="{{ .Permalink }}">{{ .Title }}</a>
        {{ end }}
    {{ end }}
</nav>
