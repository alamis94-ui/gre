<!-- Display the navigational breadcrumbs at the top of each place or garden page -->
{{ if or (eq .Type "place") (eq .Type "garden") }}
    <!-- display path hierarchy, with each level linked -->
    <nav class="breadcrumbs">
        {{ range $i, $p := .Ancestors.Reverse }}
            {{ if gt $i 0 }}
                {{ if ne $i 1 }} / {{ end }} 
                <a href="{{ .Permalink }}">{{ .Title }}</a>
            {{ end }}
        {{ end }}
    </nav>
{{ end }}
